<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Night Buy | Settings</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="settings-page">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><span class="brand-badge">NB</span>Night Buy</div>
      <ul class="side-links">
        <li><a href="index.html">Overview</a></li>
        <li><a href="buyer.html">Buyer</a></li>
        <li><a href="vendor.html">Vendor</a></li>
        <li><a href="commissions.html">Commissions</a></li>
        <li><a href="settings.html" aria-current="page">Settings</a></li>
      </ul>
      <button class="btn link" type="button" data-action="logout">Logout</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="btn alt menu-toggle" type="button" data-action="toggle-menu" aria-label="Toggle menu">☰ Menu</button>
        <span class="badge neutral" data-user-chip></span>
      </header>

      <p id="page-notice" role="status" aria-live="polite"></p>

      <section class="glass card">
        <h2>Account settings</h2>
        <form id="settings-form">
          <div class="grid cols-2">
            <div class="field">
              <label for="profile-name">Full name</label>
              <input class="input" id="profile-name" value="Demo User" />
            </div>
            <div class="field">
              <label for="profile-email">Email</label>
              <input class="input" id="profile-email" type="email" value="demo@nightbuy.app" />
            </div>
          </div>

          <div class="section-head"><h3>Payout details</h3></div>
          <div class="grid cols-2">
            <div class="field">
              <label for="bank-name">Bank name</label>
              <input class="input" id="bank-name" value="Demo Bank" />
            </div>
            <div class="field">
              <label for="account-number">Account number</label>
              <input class="input" id="account-number" value="****1033" />
            </div>
          </div>

          <div class="section-head"><h3>Notification preferences</h3></div>
          <div class="grid cols-2">
            <label class="inline"><input type="checkbox" checked /> Deal alerts</label>
            <label class="inline"><input type="checkbox" checked /> Daily summary</label>
            <label class="inline"><input type="checkbox" /> New commission payouts</label>
            <label class="inline"><input type="checkbox" checked /> Pickup reminders</label>
          </div>

          <div style="margin-top:.85rem;display:flex;gap:.55rem;align-items:center;flex-wrap:wrap;">
            <button class="btn" type="submit">Save settings</button>
            <span id="settings-message" role="status" aria-live="polite"></span>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
